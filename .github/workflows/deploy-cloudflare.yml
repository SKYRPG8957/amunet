name: Deploy Cloudflare Free Edge

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloudflare/**"
      - "public/**"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "wrangler.toml"
      - ".github/workflows/deploy-cloudflare.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      VITE_STATUS_API_URL: ""
      VITE_RELEASES_URL: ${{ vars.VITE_RELEASES_URL }}
      VITE_WINDOWS_DOWNLOAD_URL: ${{ vars.VITE_WINDOWS_DOWNLOAD_URL }}
      VITE_ANDROID_DOWNLOAD_URL: ${{ vars.VITE_ANDROID_DOWNLOAD_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'luma-arcade' }}
